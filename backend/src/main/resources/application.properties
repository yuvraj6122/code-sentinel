spring.application.name=CodeSentinel

spring.datasource.url=jdbc:postgresql://localhost:5432/codesentinel
spring.datasource.username=codesentinel_user
spring.datasource.password=codesentinel

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

codesentinel.clone.base-path=/tmp/codesentinel

# Complexity Analysis Agent thresholds (all tunable here, never hard-coded).
# Each metric is graded: value >= high -> HIGH, >= medium -> MEDIUM, >= low -> LOW,
# below low -> not reported (OK).

# Cyclomatic complexity (PMD): 11-15 LOW, 16-20 MEDIUM, >20 HIGH.
codesentinel.complexity.cyclomatic.low-threshold=11
codesentinel.complexity.cyclomatic.medium-threshold=16
codesentinel.complexity.cyclomatic.high-threshold=21
# Effectively disables class-level cyclomatic reporting (lower to enable).
codesentinel.complexity.cyclomatic-class-report-level=9999

# Method length, counted as non-empty lines: 50-99 LOW, 100-149 MEDIUM, >=150 HIGH.
codesentinel.complexity.method-length.low-threshold=50
codesentinel.complexity.method-length.medium-threshold=100
codesentinel.complexity.method-length.high-threshold=150

# Class length, counted as non-empty lines: 300-499 LOW, 500-799 MEDIUM, >=800 HIGH.
codesentinel.complexity.class-length.low-threshold=300
codesentinel.complexity.class-length.medium-threshold=500
codesentinel.complexity.class-length.high-threshold=800